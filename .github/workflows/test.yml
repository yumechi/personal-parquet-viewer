name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-wasm:
    name: Test WASM
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Cache wasm target directory
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: wasm/target
          key: ${{ runner.os }}-${{ runner.arch }}-wasm-target-${{ hashFiles('wasm/Cargo.lock', 'wasm/src/**/*.rs', 'wasm/tests/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-wasm-target-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Generate test data
        continue-on-error: true
        run: |
          cd scripts
          # Python環境のセットアップ
          python3 -m pip install --user pyarrow
          # テストデータが存在しない場合のみ生成を試みる
          if [ ! -f "test_data/small.parquet" ]; then
            python3 generate_test_parquet.py 1
          fi
          if [ ! -f "test_data2/small2.parquet" ]; then
            python3 generate_test_parquet.py 2
          fi
          if [ ! -f "test_data3/small3.parquet" ]; then
            python3 generate_test_parquet.py 3
          fi

      - name: Run WASM tests
        run: |
          cd wasm
          cargo test --lib --tests

  build-wasm-pkg:
    name: Build WASM pkg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Cache wasm-pack target directory
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: wasm/target
          key: ${{ runner.os }}-${{ runner.arch }}-wasm-pack-target-${{ hashFiles('wasm/Cargo.lock', 'wasm/src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-wasm-pack-target-

      - name: Cache wasm-pack
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: cache-wasm-pack
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ runner.arch }}-wasm-pack-v0.13.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack

      - name: Build WASM
        run: |
          cd wasm
          wasm-pack build --target web

      - name: Upload wasm/pkg artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wasm-pkg
          path: wasm/pkg
          retention-days: 1
          if-no-files-found: error

  test-frontend:
    name: Test Frontend
    needs: build-wasm-pkg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download wasm/pkg artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-pkg
          path: wasm/pkg

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate test data for E2E tests
        continue-on-error: true
        run: |
          cd scripts
          # Python環境のセットアップ
          python3 -m pip install --user pyarrow
          # テストデータが存在しない場合のみ生成を試みる
          if [ ! -f "test_data/small.parquet" ]; then
            python3 generate_test_parquet.py 1
          fi
          if [ ! -f "test_data2/small2.parquet" ]; then
            python3 generate_test_parquet.py 2
          fi
          if [ ! -f "test_data3/small3.parquet" ]; then
            python3 generate_test_parquet.py 3
          fi
          # E2Eテスト用のfixturesにコピー
          mkdir -p ../frontend/tests/fixtures
          if [ -f "test_data/small.parquet" ]; then
            cp test_data/small.parquet ../frontend/tests/fixtures/
          fi
          if [ -f "test_data2/small2.parquet" ]; then
            cp test_data2/small2.parquet ../frontend/tests/fixtures/
          fi
          if [ -f "test_data3/small3.parquet" ]; then
            cp test_data3/small3.parquet ../frontend/tests/fixtures/
          fi

      - name: Install Playwright browsers
        run: |
          cd frontend
          if [ "${{ steps.cache-playwright.outputs.cache-hit }}" = "true" ]; then
            # ブラウザバイナリはキャッシュから復元済み。システム依存だけ入れる
            npx playwright install-deps
          else
            npx playwright install --with-deps
          fi

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run E2E tests
        run: |
          cd frontend
          npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
